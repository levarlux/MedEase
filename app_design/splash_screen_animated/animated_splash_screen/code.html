<!-- STITCH_SHADER_START:ANIMATION_18 class="absolute inset-0 w-full h-full opacity-40" -->
<div class="absolute inset-0 w-full h-full opacity-40" style="display:block;">
<canvas id="shader-canvas-ANIMATION_18" style="display:block;width:100%;height:100%"></canvas>
<script>
(function() {
  const canvas = document.getElementById('shader-canvas-ANIMATION_18');

  // Sync the WebGL drawing-buffer size with the CSS-driven layout size.
  // This fires on initial layout and whenever the element is resized.
  function syncSize() {
    const w = canvas.clientWidth  || 1280;
    const h = canvas.clientHeight || 720;
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width  = w;
      canvas.height = h;
    }
  }
  if (typeof ResizeObserver !== 'undefined') {
    new ResizeObserver(syncSize).observe(canvas);
  }
  syncSize();

  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) return;
  const vs = `attribute vec2 a_position;
varying vec2 v_texCoord;
void main() {
  v_texCoord = a_position * 0.5 + 0.5;
  gl_Position = vec4(a_position, 0.0, 1.0);
}`;
  const fs = `precision highp float;
varying vec2 v_texCoord;
uniform float u_time;
uniform vec2 u_resolution;

// Helper to create a soft blob/metaball feel
float circle(vec2 uv, vec2 pos, float radius, float blur) {
    float d = length(uv - pos);
    return smoothstep(radius, radius - blur, d);
}

void main() {
    vec2 uv = v_texCoord;
    
    // Background base: Very subtle light teal/mint
    vec3 color = vec3(0.97, 0.99, 0.98); 
    
    // Animate blobs
    float t = u_time * 0.3;
    
    // Primary brand color: #86d2c1 -> vec3(0.525, 0.824, 0.757)
    vec3 primary = vec3(0.525, 0.824, 0.757);
    
    // Subtle moving gradients
    float blob1 = circle(uv, vec2(0.5 + 0.3 * sin(t), 0.5 + 0.2 * cos(t * 0.8)), 0.6, 0.5);
    float blob2 = circle(uv, vec2(0.2 + 0.1 * cos(t * 1.2), 0.8 + 0.1 * sin(t)), 0.4, 0.4);
    float blob3 = circle(uv, vec2(0.8 - 0.2 * sin(t * 0.5), 0.2 + 0.3 * cos(t * 1.5)), 0.5, 0.6);
    
    color = mix(color, primary, blob1 * 0.08);
    color = mix(color, primary, blob2 * 0.05);
    color = mix(color, primary, blob3 * 0.06);

    gl_FragColor = vec4(color, 1.0);
}`;
  function cs(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    return s;
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, cs(gl.VERTEX_SHADER, vs));
  gl.attachShader(prog, cs(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(prog);
  gl.useProgram(prog);
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const pos = gl.getAttribLocation(prog, 'a_position');
  gl.enableVertexAttribArray(pos);
  gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);
  const uTime = gl.getUniformLocation(prog, 'u_time');
  const uRes = gl.getUniformLocation(prog, 'u_resolution');
  const uMouse = gl.getUniformLocation(prog, 'u_mouse');

  // u_mouse is in pixel coordinates matching u_resolution (ShaderToy convention).
  // Shaders that need normalized coords should use: u_mouse / u_resolution.
  let mouse = { x: canvas.width / 2, y: canvas.height / 2 };
  window.addEventListener('mousemove', (event) => {
    const rect = canvas.getBoundingClientRect();
    if (rect.width && rect.height) {
      const nx = (event.clientX - rect.left) / rect.width;
      const ny = 1.0 - (event.clientY - rect.top) / rect.height;
      mouse.x = nx * canvas.width;
      mouse.y = ny * canvas.height;
    }
  });

  function render(t) {
    if (typeof ResizeObserver === 'undefined') syncSize();
    gl.viewport(0, 0, canvas.width, canvas.height);
    if (uTime) gl.uniform1f(uTime, t * 0.001);
    if (uRes) gl.uniform2f(uRes, canvas.width, canvas.height);
    if (uMouse) gl.uniform2f(uMouse, mouse.x, mouse.y);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(render);
  }
  render(0);
})();
</script>

<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const progressBar = document.getElementById('progress-bar');
            const progressPercent = document.getElementById('progress-percent');
            
            // Start progress animation
            setTimeout(() => {
                progressBar.style.width = '100%';
                
                let count = 0;
                const interval = setInterval(() => {
                    count += 1;
                    if (count <= 100) {
                        progressPercent.innerText = count + '%';
                    } else {
                        clearInterval(interval);
                    }
                }, 30); // Matches the 3000ms duration roughly
            }, 500);

            // Subtle parallax effect on logo based on mouse movement (optional desktop polish)
            if (window.innerWidth > 768) {
                document.addEventListener('mousemove', (e) => {
                    const x = (window.innerWidth / 2 - e.pageX) / 50;
                    const y = (window.innerHeight / 2 - e.pageY) / 50;
                    const logoContainer = document.querySelector('animated-svg');
                    if (logoContainer) {
                        logoContainer.style.transform = `translate(${x}px, ${y}px)`;
                        logoContainer.style.transition = 'transform 0.1s ease-out';
                    }
                });
            }
        });
    </script>

<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_SVG_START:ANIMATION_17 class="fixed inset-0 w-full h-full" --><div class="fixed inset-0 w-full h-full" id="animated-svg-ANIMATION_17" style="display:block;"><svg viewbox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
<defs>
<lineargradient id="grad" x1="0%" x2="100%" y1="0%" y2="100%">
<stop offset="0%" style="stop-color:#86d2c1;stop-opacity:1"></stop>
<stop offset="100%" style="stop-color:#5fb8a4;stop-opacity:1"></stop>
</lineargradient>
<filter height="140%" id="shadow" width="140%" x="-20%" y="-20%">
<fegaussianblur in="SourceAlpha" stddeviation="2"></fegaussianblur>
<feoffset dx="0" dy="2" result="offsetblur"></feoffset>
<fecomponenttransfer>
<fefunca slope="0.3" type="linear"></fefunca>
</fecomponenttransfer>
<femerge>
<femergenode></femergenode>
<femergenode in="SourceGraphic"></femergenode>
</femerge>
</filter>
</defs>
<!-- Background Container -->
<rect fill="white" filter="url(#shadow)" height="80" rx="20" width="80" x="10" y="10">
<animate attributename="opacity" dur="1s" fill="freeze" values="0;1"></animate>
</rect>
<!-- Med Case Icon Body -->
<path d="M30 40 H70 V75 Q70 80 65 80 H35 Q30 80 30 75 V40 Z" fill="url(#grad)">
<animatetransform attributename="transform" calcmode="spline" dur="1.2s" keysplines="0.4, 0, 0.2, 1; 0.4, 0, 0.2, 1" keytimes="0;0.7;1" type="scale" values="0.9;1.05;1"></animatetransform>
</path>
<!-- Med Case Handle -->
<path d="M40 40 V35 Q40 30 45 30 H55 Q60 30 60 35 V40" fill="none" stroke="#86d2c1" stroke-linecap="round" stroke-width="4">
<animate attributename="stroke-dasharray" dur="1.5s" fill="freeze" from="0,100" to="100,0"></animate>
</path>
<!-- Plus Sign -->
<g transform="translate(50, 60)">
<path d="M-10 0 H10 M0 -10 V10" fill="none" stroke="white" stroke-linecap="round" stroke-width="4">
<animate attributename="stroke-dashoffset" begin="0.5s" dur="1s" fill="freeze" from="40" to="0"></animate>
<animate attributename="stroke-dasharray" dur="0.1s" fill="freeze" values="40"></animate>
</path>
<animatetransform attributename="transform" dur="10s" from="0 50 60" repeatcount="indefinite" to="360 50 60" type="rotate"></animatetransform>
</g>
<!-- Floating Particles/Dots -->
<circle cx="25" cy="25" fill="#86d2c1" opacity="0.6" r="2">
<animate attributename="cy" dur="3s" repeatcount="indefinite" values="25;20;25"></animate>
</circle>
<circle cx="75" cy="30" fill="#86d2c1" opacity="0.4" r="1.5">
<animate attributename="cy" dur="4s" repeatcount="indefinite" values="30;35;30"></animate>
</circle>
</svg></div><!-- STITCH_SVG_END:ANIMATION_17 -->
</body>
</html>

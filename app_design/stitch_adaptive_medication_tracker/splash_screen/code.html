<style>
        body {
            font-family: 'Manrope', sans-serif;
            background-color: #f8f9fa;
            color: #191c1d;
            overflow: hidden;
            margin: 0;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }

        /* Ambient Pulsing Background Glow */
        .ambient-glow {
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(134, 210, 193, 0.15) 0%, rgba(248, 249, 250, 0) 70%);
            border-radius: 50%;
            filter: blur(80px);
            animation: float 10s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes float {
            0% { transform: translate(-20%, -20%) scale(1); }
            100% { transform: translate(10%, 10%) scale(1.1); }
        }

        /* Logo Fade In & Up */
        .splash-entrance {
            animation: fadeInUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(20px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Heartbeat Animation for Logo Icon */
        .logo-pulse {
            animation: heartbeat 2s ease-in-out infinite;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); filter: drop-shadow(0 0 0 rgba(20, 106, 92, 0)); }
            15% { transform: scale(1.08); filter: drop-shadow(0 0 15px rgba(20, 106, 92, 0.3)); }
            30% { transform: scale(1); filter: drop-shadow(0 0 0 rgba(20, 106, 92, 0)); }
            45% { transform: scale(1.05); filter: drop-shadow(0 0 8px rgba(20, 106, 92, 0.2)); }
            70% { transform: scale(1); filter: drop-shadow(0 0 0 rgba(20, 106, 92, 0)); }
        }

        /* Loader Bar Animation */
        .progress-bar-container {
            width: 180px;
            height: 4px;
            background-color: rgba(20, 106, 92, 0.1);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 40px;
        }

        .progress-bar-fill {
            height: 100%;
            background-color: #146a5c;
            width: 0%;
            animation: fillProgress 2.5s cubic-bezier(0.65, 0, 0.35, 1) forwards;
        }

        @keyframes fillProgress {
            0% { width: 0%; }
            50% { width: 60%; }
            100% { width: 100%; }
        }
    </style>
<style>

<div class="absolute inset-0 pointer-events-none opacity-[0.03]" style="background-image: url('https://www.transparenttextures.com/patterns/p6.png');"></div>
<script>
        // Simple JS for a subtle parallax effect on mouse move for the glow blobs
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 40;
            const y = (e.clientY / window.innerHeight - 0.5) * 40;
            
            const glows = document.querySelectorAll('.ambient-glow');
            glows.forEach((glow, idx) => {
                const multiplier = idx === 0 ? 1 : -1;
                glow.style.transform = `translate(${x * multiplier}px, ${y * multiplier}px)`;
            });
        });

        // Automatically "redirect" or finish the splash sequence
        window.addEventListener('load', () => {
            setTimeout(() => {
                // In a real app, this would trigger navigation to the dashboard/login
                console.log('MediFlow Ready');
            }, 2800);
        });
    </script>
